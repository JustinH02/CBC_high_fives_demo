<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CBC High Fives – Birthday Slideshow</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #1a1a2e;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 24px;
    }

    header {
      text-align: center;
      margin-bottom: 28px;
    }
    header h1 { font-size: 2rem; letter-spacing: .5px; }
    header p  { color: #aaa; margin-top: 6px; font-size: .95rem; }

    /* Date filter */
    .filter-bar {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 36px;
    }
    .filter-bar label { font-size: .9rem; color: #ccc; }
    .filter-bar input[type="date"] {
      padding: 9px 12px;
      border-radius: 8px;
      border: 1.5px solid #555;
      background: #16213e;
      color: #fff;
      font-size: .95rem;
    }
    .filter-bar button {
      padding: 9px 18px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: .9rem;
      font-weight: 600;
    }
    #btnFilter { background: #43a047; color: #fff; }
    #btnFilter:hover { background: #2e7d32; }
    #btnClear  { background: #555; color: #fff; }
    #btnClear:hover { background: #777; }

    /* Slideshow wrapper */
    #slideshow-wrapper {
      position: relative;
      width: 100%;
      max-width: 640px;
    }

    /* Individual slide */
    .slide {
      display: none;
      text-align: center;
      animation: fadeIn .6s ease;
    }
    .slide.active { display: block; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .slide-photo {
      width: 320px;
      height: 320px;
      object-fit: cover;
      border-radius: 50%;
      border: 6px solid #43a047;
      margin: 0 auto 24px;
      display: block;
      background: #16213e;
    }

    .slide-photo-placeholder {
      width: 320px;
      height: 320px;
      border-radius: 50%;
      border: 6px solid #43a047;
      margin: 0 auto 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 6rem;
      background: #16213e;
    }

    .slide-name { font-size: 2rem; font-weight: 700; }
    .slide-age  { font-size: 1.2rem; color: #a5d6a7; margin-top: 8px; }
    .slide-town {
      font-size: 1rem;
      color: #ccc;
      margin-top: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .slide-bday {
      font-size: .88rem;
      color: #888;
      margin-top: 8px;
    }

    /* Controls */
    .controls {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 24px;
      margin-top: 32px;
    }

    .controls button {
      background: #16213e;
      border: 2px solid #43a047;
      color: #fff;
      padding: 10px 22px;
      border-radius: 50px;
      font-size: 1.1rem;
      cursor: pointer;
      transition: background .2s;
    }
    .controls button:hover { background: #43a047; }
    .controls button:disabled { opacity: .35; cursor: not-allowed; }

    #counter {
      font-size: .9rem;
      color: #aaa;
      min-width: 80px;
      text-align: center;
    }

    /* Auto-play toggle */
    .autoplay-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 20px;
      font-size: .88rem;
      color: #aaa;
    }
    .autoplay-row input { cursor: pointer; width: 16px; height: 16px; }

    /* No results */
    #no-results {
      color: #aaa;
      font-size: 1rem;
      text-align: center;
      padding: 40px 0;
      display: none;
    }

    /* Dot indicators */
    #dots {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-top: 20px;
      flex-wrap: wrap;
    }
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #555;
      cursor: pointer;
      transition: background .2s;
    }
    .dot.active { background: #43a047; }

    .back-link {
      margin-top: 40px;
      color: #43a047;
      text-decoration: none;
      font-size: .9rem;
    }
    .back-link:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <header>
    <h1>🎂 Birthday Slideshow</h1>
    <p>Celebrating CBC High Fives kids!</p>
  </header>

  <div class="filter-bar">
    <label for="dateFilter">Filter by birthdate:</label>
    <input type="date" id="dateFilter" />
    <button id="btnFilter">Show</button>
    <button id="btnClear">Clear</button>
  </div>

  <div id="slideshow-wrapper">
    <div id="slides-container"></div>
    <div id="no-results">No children found for the selected date.<br />Try a different date or clear the filter.</div>

    <div id="dots"></div>

    <div class="controls">
      <button id="btnPrev" title="Previous">&#8592; Prev</button>
      <span id="counter"></span>
      <button id="btnNext" title="Next">Next &#8594;</button>
    </div>

    <div class="autoplay-row">
      <input type="checkbox" id="autoplay" />
      <label for="autoplay">Auto-advance every 5 seconds</label>
    </div>
  </div>

  <a class="back-link" href="/">← Back to submission form</a>

  <script>
    let slides = [];
    let current = 0;
    let autoTimer = null;

    async function loadSlides(date) {
      const url = date ? `/children?date=${encodeURIComponent(date)}` : '/children';
      const res = await fetch(url);
      const children = await res.json();
      return children;
    }

    function buildSlides(children) {
      const container = document.getElementById('slides-container');
      const dots      = document.getElementById('dots');
      const noResults = document.getElementById('no-results');

      container.innerHTML = '';
      dots.innerHTML = '';
      slides = [];

      if (!children.length) {
        noResults.style.display = 'block';
        document.querySelector('.controls').style.display = 'none';
        document.getElementById('counter').textContent = '';
        return;
      }

      noResults.style.display = 'none';
      document.querySelector('.controls').style.display = 'flex';

      children.forEach((child, idx) => {
        const slide = document.createElement('div');
        slide.className = 'slide' + (idx === 0 ? ' active' : '');

        const safeSrc = child.photo ? encodeURI(child.photo).replace(/['"<>]/g, '') : null;
        const photoEl = safeSrc
          ? `<img class="slide-photo" src="${safeSrc}" alt="Photo of ${escapeHtml(child.child_name)}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" /><div class="slide-photo-placeholder" style="display:none">👦</div>`
          : `<div class="slide-photo-placeholder">👦</div>`;

        slide.innerHTML = `
          ${photoEl}
          <div class="slide-name">${escapeHtml(child.child_name)}</div>
          <div class="slide-age">Age ${child.age}</div>
          <div class="slide-town">📍 ${escapeHtml(child.town)}</div>
          <div class="slide-bday">🎂 ${formatDate(child.birthdate)}</div>
        `;

        container.appendChild(slide);
        slides.push(slide);

        const dot = document.createElement('div');
        dot.className = 'dot' + (idx === 0 ? ' active' : '');
        dot.addEventListener('click', () => goTo(idx));
        dots.appendChild(dot);
      });

      current = 0;
      updateCounter();
      updateButtons();
    }

    function goTo(idx) {
      slides[current].classList.remove('active');
      document.querySelectorAll('.dot')[current].classList.remove('active');
      current = idx;
      slides[current].classList.add('active');
      document.querySelectorAll('.dot')[current].classList.add('active');
      updateCounter();
      updateButtons();
    }

    function updateCounter() {
      document.getElementById('counter').textContent =
        slides.length ? `${current + 1} / ${slides.length}` : '';
    }

    function updateButtons() {
      document.getElementById('btnPrev').disabled = current === 0;
      document.getElementById('btnNext').disabled = current === slides.length - 1;
    }

    function escapeHtml(str) {
      const d = document.createElement('div');
      d.appendChild(document.createTextNode(str));
      return d.innerHTML;
    }

    function formatDate(iso) {
      if (!iso) return '';
      const [y, m, d] = iso.split('-');
      const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      return `${months[parseInt(m,10)-1]} ${parseInt(d,10)}, ${y}`;
    }

    // Controls
    document.getElementById('btnPrev').addEventListener('click', () => {
      if (current > 0) goTo(current - 1);
    });
    document.getElementById('btnNext').addEventListener('click', () => {
      if (current < slides.length - 1) goTo(current + 1);
    });

    // Auto-play
    document.getElementById('autoplay').addEventListener('change', function () {
      if (this.checked) {
        autoTimer = setInterval(() => {
          const next = (current + 1) % slides.length;
          goTo(next);
        }, 5000);
      } else {
        clearInterval(autoTimer);
        autoTimer = null;
      }
    });

    // Filter
    document.getElementById('btnFilter').addEventListener('click', async () => {
      const date = document.getElementById('dateFilter').value;
      const children = await loadSlides(date || null);
      buildSlides(children);
    });

    document.getElementById('btnClear').addEventListener('click', async () => {
      document.getElementById('dateFilter').value = '';
      const children = await loadSlides(null);
      buildSlides(children);
    });

    // Initial load
    (async () => {
      const children = await loadSlides(null);
      buildSlides(children);
    })();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CBC High Fives – Submit a Child</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,.12);
      max-width: 520px;
      width: 100%;
      padding: 40px 36px 32px;
    }

    .logo {
      text-align: center;
      margin-bottom: 28px;
    }
    .logo h1 { font-size: 1.8rem; color: #2e7d32; }
    .logo p  { color: #666; font-size: .95rem; margin-top: 4px; }

    label {
      display: block;
      font-size: .88rem;
      font-weight: 600;
      color: #444;
      margin-bottom: 4px;
    }

    input[type="text"],
    input[type="number"],
    input[type="email"],
    input[type="date"],
    input[type="file"] {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid #ccc;
      border-radius: 8px;
      font-size: .95rem;
      transition: border-color .2s;
    }

    input:focus { outline: none; border-color: #43a047; }

    .field { margin-bottom: 18px; }

    .hint { font-size: .78rem; color: #888; margin-top: 3px; }

    #photo-preview {
      margin-top: 8px;
      display: none;
      max-width: 100%;
      max-height: 180px;
      border-radius: 8px;
      object-fit: cover;
      border: 1px solid #ddd;
    }

    button[type="submit"] {
      width: 100%;
      padding: 13px;
      background: #43a047;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background .2s;
      margin-top: 6px;
    }
    button[type="submit"]:hover { background: #2e7d32; }

    .nav-link {
      display: block;
      text-align: center;
      margin-top: 20px;
      color: #43a047;
      text-decoration: none;
      font-size: .9rem;
    }
    .nav-link:hover { text-decoration: underline; }

    #status {
      margin-top: 14px;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: .9rem;
      display: none;
    }
    #status.success { background: #e8f5e9; color: #2e7d32; border: 1px solid #a5d6a7; }
    #status.error   { background: #ffebee; color: #c62828; border: 1px solid #ef9a9a; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <h1>🖐 CBC High Fives</h1>
      <p>Register your child's birthday celebration</p>
    </div>

    <form id="submitForm" enctype="multipart/form-data">
      <div class="field">
        <label for="child_name">Child's Name *</label>
        <input type="text" id="child_name" name="child_name" placeholder="e.g. Emma Smith" required />
      </div>

      <div class="field">
        <label for="age">Child's Age *</label>
        <input type="number" id="age" name="age" min="0" max="18" placeholder="e.g. 7" required />
      </div>

      <div class="field">
        <label for="town">Town / City *</label>
        <input type="text" id="town" name="town" placeholder="e.g. Springfield" required />
      </div>

      <div class="field">
        <label for="birthdate">Child's Birthdate *</label>
        <input type="date" id="birthdate" name="birthdate" required />
      </div>

      <div class="field">
        <label for="parent_email">Parent's Email *</label>
        <input type="email" id="parent_email" name="parent_email" placeholder="parent@example.com" required />
      </div>

      <div class="field">
        <label for="photo">Child's Photo</label>
        <input type="file" id="photo" name="photo" accept="image/*" />
        <p class="hint">Optional – JPEG, PNG, GIF, or WebP · max 5 MB</p>
        <img id="photo-preview" alt="Photo preview" />
      </div>

      <button type="submit">Submit ✔</button>
    </form>

    <div id="status" role="alert"></div>
    <a class="nav-link" href="/slideshow">View Birthday Slideshow →</a>
  </div>

  <script>
    // Live photo preview
    let currentObjectUrl = null;
    document.getElementById('photo').addEventListener('change', function () {
      const preview = document.getElementById('photo-preview');
      // Revoke the previous object URL to avoid memory leaks
      if (currentObjectUrl) {
        URL.revokeObjectURL(currentObjectUrl);
        currentObjectUrl = null;
      }
      const file = this.files[0];
      if (file) {
        currentObjectUrl = URL.createObjectURL(file);
        preview.src = currentObjectUrl;
        preview.style.display = 'block';
      } else {
        preview.style.display = 'none';
      }
    });

    // Form submission via fetch
    document.getElementById('submitForm').addEventListener('submit', async function (e) {
      e.preventDefault();
      const status = document.getElementById('status');
      status.style.display = 'none';

      const formData = new FormData(this);

      try {
        const res = await fetch('/submit', { method: 'POST', body: formData });
        const data = await res.json();

        if (res.ok && data.success) {
          status.textContent = '✅ Child registered successfully! Thank you.';
          status.className = 'success';
          this.reset();
          document.getElementById('photo-preview').style.display = 'none';
        } else {
          status.textContent = `❌ ${data.error || 'Submission failed. Please try again.'}`;
          status.className = 'error';
        }
      } catch (err) {
        status.textContent = '❌ Network error. Please try again.';
        status.className = 'error';
      }

      status.style.display = 'block';
    });
  </script>
</body>
</html>
